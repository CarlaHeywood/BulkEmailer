<!doctype html>
<html>

  <head>
    <title>BulkEmailer</title>
  </head>

  <body>
     <form action="/forms/contact.php" method="post" class="php-email-form mt-4">
        <div class="form-row">
          <div class="col-md-6 form-group">
            <input type="text" name="name" class="form-control" id="name" placeholder="Your Name" data-rule="minlen:4" data-msg="Please enter at least 4 chars" />
            <div class="validate"></div>
          </div>
          <div class="col-md-6 form-group">
            <input type="email" class="form-control" name="email" id="email" placeholder="Your Email" data-rule="email" data-msg="Please enter a valid email" />
            <div class="validate"></div>
          </div>
        </div>
        <div class="form-group">
          <input type="text" class="form-control" name="subject" id="subject" placeholder="Subject" data-rule="minlen:4" data-msg="Please enter at least 8 chars of subject" />
          <div class="validate"></div>
        </div>
        <div class="form-group">
          <textarea class="form-control" name="message" rows="5" data-rule="required" data-msg="Please write something for us" placeholder="Message"></textarea>
          <div class="validate"></div>
        </div>
        <div class="mb-3">
          <div class="loading">Loading</div>
          <div class="sent-message">Please try again.</div>
          <div class="error-message">Your message has been sent. Thank you!</div>
        </div>
        <div class="text-center"><button type="submit" name="submit" value="submit">Send Message</button></div>
      </form>

 	 <!-- Vendor JS Files -->
 	 <script src="assets/vendor/jquery/jquery.min.js"></script>
 	 <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
 	 <script src="assets/vendor/jquery.easing/jquery.easing.min.js"></script>
 	 <script src="assets/vendor/php-email-form/validate.js"></script>
 	 <script src="assets/vendor/waypoints/jquery.waypoints.min.js"></script>
 	 <script src="assets/vendor/counterup/counterup.min.js"></script>
 	 <script src="assets/vendor/owl.carousel/owl.carousel.min.js"></script>
  	<script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  	<script src="assets/vendor/venobox/venobox.min.js"></script>
  </body>
</html>
