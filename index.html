<!doctype html>
<html>

  <head>
    <title>BulkEmailer</title>

    <!-- Link Styles -->
    <link type="text/css" media="screen" rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
  
    <!-- Google Sign In Authentication -->
    <meta name="google-signin-client_id" content="419471981735-cpne6i1s0cr1bs7q72hgcqksjqc8k9el.apps.googleusercontent.com">
  </head>

  <body>
    <!-- Google Sign to get email address -->
    <!-- <div style="margin-bottom:25px;" class="g-signin2" data-onsuccess="onSignIn"></div> -->

    <!-- ------------------------------FORM---------------------------- -->
     <form action="" class="python-email-form" enctype="multipart/form-data">
        <div class="form-group"> <!-- SUBJECT -->
          <label style="font-size:24px;" for="subject">Select a Campaign: </label>
            <select style="font-size:24px;" name="subject" id="subject" placeholder="Subject">
              <option value="template.html">template.html</option>
              <div class="validate"></div>
            </select>
        </div>
        <div class="form-group"> <!-- FILE UPLOAD -->
          <label style="font-size:24px;" for="listFile">Upload your list file: </label>
          <input type="file" name="listFile" id="listFile" placeholder="List File">
          <div class="validate"></div>
        </div>
        <div class="text-center">
          <input style="font-size:18px;" onClick="fileuploader.py" class="sendBulkEmail" type="submit" name="submit" value="Send BulkEmail">
        </div>
        <!-- Send BulkEmail Status -->
        <div class="submitStatus"> 
          <div class="loading">Loading...</div>
          <div class="error-message">Please try again.</div>
          <div class="sent-message">BulkEmail Successful!</div>
        </div>
      </form> <!-- ----------------------------------------------------- -->

      <!-- Copyright -->
      <p style="position: absolute; bottom: 0; left: 5px;">&copy; 2022 BulkEmailer by Carla Heywood.</p>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="/bootstrap/js/bootstrap.min.js"></script>
    
    <!-- Link Main JS File -->
    <script src="signIn.js"></script>
    <script src="fileuploader.py"></script>
    <!-- <script src="validate.js"></script> -->

    <!-- Google Sign In -->
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <script src="https://apis.google.com/js/platform.js?onload=renderButton" async defer></script>
  </body>
</html>
